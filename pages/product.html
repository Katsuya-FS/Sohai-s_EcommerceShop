<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Detail</title>
  <link rel="stylesheet" href="../assets/stylesheet/product.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <!-- Header will be loaded dynamically -->
  <div id="header-container"></div>

  <div class="product-container">
    <div class="product-content">
      <!-- Product Image Section -->
      <div class="product-image-section">
        <div class="main-image">
          <img id="main-image" src="" alt="Product Image">
        </div>
      </div>

      <!-- Product Details Section -->
      <div class="product-details-section">
        <h1 id="product-name" class="product-name"></h1>

        <div class="rating">
          <span class="stars">★★★★★</span>
          <span class="review-count">(0 reviews)</span>
        </div>

        <div class="price-section">
          <span class="price" id="product-price"></span>
          <span class="status">In Stock</span>
        </div>

        <p class="description" id="product-description">High-quality product with premium features and excellent
          performance.</p>

        <div class="specifications">
          <h3>Specifications</h3>
          <ul id="specs-list">
            <li>Premium Quality</li>
            <li>Durable Design</li>
            <li>Professional Grade</li>
          </ul>
        </div>

        <div class="quantity-section">
          <label for="quantity">Quantity:</label>
          <div class="quantity-selector">
            <button class="qty-btn" id="qty-minus">−</button>
            <input type="number" id="quantity" value="1" min="1" max="10">
            <button class="qty-btn" id="qty-plus">+</button>
          </div>
        </div>

        <div class="action-buttons">
          <button class="btn-add-cart"><i class="fas fa-shopping-cart"></i> Add to Cart</button>
          <button class="btn-wishlist"><i class="fas fa-heart"></i></button>
        </div>
      </div>
    </div>

    <!-- Related Products Section -->
    <div class="related-products">
      <h2>Related Products</h2>
      <div id="related-list" class="related-products-grid">
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <p>&copy; 2026 Sohai's Shop. All Rights Reserved.</p>
    <div class="footer-social">
      <p class="contact-text">Contact us more on</p>
      <a href="https://www.facebook.com/sohaicomputer" target="_blank" class="social-icon facebook-icon">
        <i class="fab fa-facebook-f"></i>
      </a>
    </div>
  </footer>

  <script src="../assets/script/collections.js"></script>
  <script src="../assets/script/auth.js"></script>
  <script src="../assets/script/cart.js"></script>
  <script src="../assets/script/load-header.js"></script>
  <script src="../assets/script/product.js"></script>
</body>

</html>
